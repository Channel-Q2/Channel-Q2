<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>調号マスター v0.2.0</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .app { width: min(100%, 430px); }
    .screen { display: none; }
    .screen.active { display: block; }
    h1 { font-size: 36px; margin: 0 0 8px; text-align: center; }
    h2 { font-size: 28px; margin: 0 0 20px; text-align: center; }
    .version { text-align: center; color: #666; margin-bottom: 28px; }
    .panel {
      border: 1px solid #ddd;
      border-radius: 18px;
      padding: 20px;
      background: #fff;
    }
    .mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 18px 0;
    }
    .mode-btn, .primary, .secondary {
      width: 100%;
      min-height: 52px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .mode-btn {
      border: 2px solid #bbb;
      background: #fff;
    }
    .mode-btn.selected {
      border-color: #111;
      background: #f3f3f3;
    }
    .primary {
      border: none;
      background: #111;
      color: #fff;
      margin-top: 10px;
    }
    .secondary {
      border: 1px solid #bbb;
      background: #fff;
      margin-top: 10px;
    }
    .hidden { display: none !important; }
    label {
      display: block;
      text-align: left;
      font-weight: 700;
      margin: 14px 0 8px;
    }
    select {
      width: 100%;
      min-height: 50px;
      font-size: 18px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #bbb;
      background: #fff;
    }
    select:disabled { background: #f3f3f3; color: #555; }
    .question {
      font-size: 34px;
      font-weight: 800;
      text-align: center;
      margin: 20px 0;
    }
    .status {
      text-align: center;
      color: #666;
      margin-bottom: 8px;
    }
    .message {
      min-height: 32px;
      text-align: center;
      font-weight: 700;
      line-height: 1.55;
      margin-top: 14px;
      white-space: pre-line;
    }
    .answer-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      background: #f3f3f3;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.6;
    }
    .note {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="splash" class="screen active">
      <h1>調号マスター</h1>
      <div class="version">Version 0.2.0</div>
      <button id="enterBtn" class="primary" type="button">はじめる</button>
    </section>

    <section id="menu" class="screen">
      <h2>モード選択</h2>
      <div class="panel">
        <div class="mode-row">
          <button id="sharpBtn" class="mode-btn selected" type="button">♯モード</button>
          <button id="flatBtn" class="mode-btn" type="button">♭モード</button>
        </div>
        <button id="startBtn" class="primary" type="button">START</button>
        <div class="note">間違えた問題は、最後にもう一度出題されます。</div>
      </div>
    </section>

    <section id="game" class="screen">
      <div class="status" id="progress">問題 1 / 8</div>
      <div class="question" id="question">♯が0個</div>

      <div class="panel">
        <label for="majorSelect">長調</label>
        <select id="majorSelect"></select>

        <label for="minorSelect">短調</label>
        <select id="minorSelect"></select>

        <button id="answerBtn" class="primary" type="button">回答</button>
        <button id="nextBtn" class="primary hidden" type="button">次の問題へ</button>
        <button id="menuBtn" class="secondary" type="button">メニューへ戻る</button>

        <div id="message" class="message"></div>
        <div id="answerBox" class="answer-box hidden"></div>
      </div>
    </section>
  </main>

  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const screens = {
      splash: document.getElementById("splash"),
      menu: document.getElementById("menu"),
      game: document.getElementById("game")
    };

    const sharpData = [
      { n: 0, major: "C",  minor: "Am" },
      { n: 1, major: "G",  minor: "Em" },
      { n: 2, major: "D",  minor: "Bm" },
      { n: 3, major: "A",  minor: "F#m" },
      { n: 4, major: "E",  minor: "C#m" },
      { n: 5, major: "B",  minor: "G#m" },
      { n: 6, major: "F#", minor: "D#m" },
      { n: 7, major: "C#", minor: "A#m" }
    ];

    const flatData = [
      { n: 0, major: "C",  minor: "Am" },
      { n: 1, major: "F",  minor: "Dm" },
      { n: 2, major: "B♭", minor: "Gm" },
      { n: 3, major: "E♭", minor: "Cm" },
      { n: 4, major: "A♭", minor: "Fm" },
      { n: 5, major: "D♭", minor: "B♭m" },
      { n: 6, major: "G♭", minor: "E♭m" },
      { n: 7, major: "C♭", minor: "A♭m" }
    ];

    const majorOptions = ["C","G","D","A","E","B","F#","C#","F","B♭","E♭","A♭","D♭","G♭","C♭"];
    const minorOptions = ["Am","Em","Bm","F#m","C#m","G#m","D#m","A#m","Dm","Gm","Cm","Fm","B♭m","E♭m","A♭m"];

    const majorSelect = document.getElementById("majorSelect");
    const minorSelect = document.getElementById("minorSelect");
    const answerBtn = document.getElementById("answerBtn");
    const nextBtn = document.getElementById("nextBtn");
    const message = document.getElementById("message");
    const answerBox = document.getElementById("answerBox");
    const progress = document.getElementById("progress");
    const question = document.getElementById("question");

    let mode = "sharp";
    let queue = [];
    let currentIndex = 0;
    let totalAnswered = 0;
    let waitingForNext = false;

    function show(name) {
      Object.values(screens).forEach(el => el.classList.remove("active"));
      screens[name].classList.add("active");
    }

    function fillSelect(select, values) {
      select.innerHTML = '<option value="">選択してください</option>';
      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function setControlsLocked(locked) {
      majorSelect.disabled = locked;
      minorSelect.disabled = locked;
      answerBtn.classList.toggle("hidden", locked);
      nextBtn.classList.toggle("hidden", !locked);
      waitingForNext = locked;
    }

    function renderQuestion() {
      const q = queue[currentIndex];
      if (!q) {
        alert("全問クリアです！");
        show("menu");
        return;
      }

      progress.textContent = `問題 ${totalAnswered + 1}`;
      question.textContent = `${mode === "sharp" ? "♯" : "♭"}が${q.n}個`;
      majorSelect.value = "";
      minorSelect.value = "";
      message.textContent = "";
      answerBox.textContent = "";
      answerBox.classList.add("hidden");
      setControlsLocked(false);
    }

    function moveNext() {
      currentIndex += 1;
      totalAnswered += 1;
      renderQuestion();
    }

    fillSelect(majorSelect, majorOptions);
    fillSelect(minorSelect, minorOptions);

    document.getElementById("enterBtn").addEventListener("click", () => show("menu"));

    document.getElementById("sharpBtn").addEventListener("click", function () {
      mode = "sharp";
      this.classList.add("selected");
      document.getElementById("flatBtn").classList.remove("selected");
    });

    document.getElementById("flatBtn").addEventListener("click", function () {
      mode = "flat";
      this.classList.add("selected");
      document.getElementById("sharpBtn").classList.remove("selected");
    });

    document.getElementById("startBtn").addEventListener("click", function () {
      queue = (mode === "sharp" ? sharpData : flatData).map(q => ({...q}));
      currentIndex = 0;
      totalAnswered = 0;
      renderQuestion();
      show("game");
    });

    answerBtn.addEventListener("click", function () {
      if (waitingForNext) return;

      const q = queue[currentIndex];
      const major = majorSelect.value;
      const minor = minorSelect.value;

      if (!major || !minor) {
        message.textContent = "長調と短調を両方選んでください";
        return;
      }

      const correct = major === q.major && minor === q.minor;

      if (correct) {
        message.textContent = "正解";
      } else {
        message.textContent = "不正解";
        answerBox.textContent = `正解は「${q.major} / ${q.minor}」です`;
        answerBox.classList.remove("hidden");

        // 間違えた問題を、最後にもう一度追加する
        queue.push({...q});
      }

      setControlsLocked(true);
    });

    nextBtn.addEventListener("click", moveNext);

    document.getElementById("menuBtn").addEventListener("click", function () {
      show("menu");
    });
  });
  </script>
</body>
</html>
