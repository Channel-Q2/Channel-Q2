<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f7f0df">
<title>иӘҝеҸ·гғһгӮ№гӮҝгғј Version 0.4</title>
<style>
:root{
  --ivory:#f7f0df;--paper:#fffdf7;--ink:#25302f;--muted:#6f756f;
  --line:#d7ccb6;--green:#3f7d70;--green2:#2f6258;--soft:#dceee8;
  --blue:#e8f0f7;--orange:#f6e8d8;--shadow:#cdbfa6;--red:#873838
}
*{box-sizing:border-box}
body{
  margin:0;background:var(--ivory);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  padding:14px 14px 24px
}
button{font:inherit}
.app{max-width:620px;margin:auto}
.screen{display:none}.screen.active{display:block}
.panel{
  background:var(--paper);border:1px solid var(--line);border-radius:24px;
  padding:20px;box-shadow:0 14px 34px #4b3c261f
}
h1{text-align:center;margin:4px 0 0;font-size:31px}
.version,.subtitle{text-align:center;color:var(--muted)}
.version{font-size:12px;margin:4px 0 12px}.subtitle{font-size:14px;margin:0 0 16px}
.circle{background:#fffaf0;border:1px solid var(--line);border-radius:20px;padding:8px;margin-bottom:18px}
svg{display:block;width:100%;height:auto}
.levels{display:grid;gap:12px}
.level,.option,.primary,.secondary,.danger,.badge{transition:.08s;cursor:pointer}
.level{
  width:100%;text-align:left;background:var(--paper);border:1px solid var(--line);
  border-radius:17px;padding:15px 16px;box-shadow:0 5px 0 var(--shadow)
}
.level strong{display:block;font-size:18px;margin-bottom:4px}
.level span{font-size:13px;color:var(--muted);line-height:1.5}
.level:active,.option:active,.primary:active,.secondary:active,.danger:active{
  transform:translateY(4px);box-shadow:0 2px 0 #0003
}
.top{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;margin-bottom:12px}
.badge{
  background:var(--paper);border:1px solid var(--line);border-radius:999px;
  padding:8px 12px;font-weight:700;box-shadow:0 3px 0 #d8cdb8
}
.stats{text-align:center;color:var(--muted);font-size:13px}
.progress-wrap{margin:0 0 12px}
.progress-label{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;margin-bottom:5px}
.progress{height:8px;background:#e8decb;border-radius:999px;overflow:hidden}
.progress span{display:block;width:50%;height:100%;background:var(--green);transition:.25s}
.question{
  background:var(--paper);border:1px solid var(--line);border-radius:22px;
  padding:20px 12px;text-align:center;box-shadow:0 6px 0 #d8cdb8;margin-bottom:14px
}
.question small{display:block;color:var(--muted);font-weight:700;margin-bottom:6px}
.question strong{display:block;font-size:34px;line-height:1.3}
.hint,.legend{text-align:center;color:var(--muted);font-size:13px}
.hint{margin-top:7px}.legend{margin:9px 0 12px}
.options{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.option{
  background:var(--paper);border:1px solid var(--line);border-radius:14px;
  min-height:54px;padding:9px 5px;font-size:16px;font-weight:800;color:var(--ink);
  box-shadow:0 5px 0 var(--shadow);display:flex;justify-content:center;align-items:center;gap:7px
}
.option:before{content:"в—Ӣ";font-size:19px;color:#8e948f}
.option.selected{background:var(--soft)!important;border-color:#79a79c;box-shadow:0 5px 0 #79a79c}
.option.selected:before{content:"в—Ҹ";color:var(--green)}
.major{background:var(--blue)}.minor{background:var(--orange)}.signature{background:#fffaf0}
.feedback{display:none;border-radius:16px;padding:13px;margin-top:14px;text-align:center;font-weight:700;line-height:1.5}
.feedback.show{display:block}.ok{background:#dff0e6;color:#235f47}.ng{background:#f6dddd;color:var(--red)}
.actions{position:sticky;bottom:0;padding:16px 0 6px;background:linear-gradient(transparent,var(--ivory) 28%)}
.primary,.secondary,.danger{width:100%;border:0;border-radius:16px;padding:15px 16px;font-size:17px;font-weight:800}
.primary{background:var(--green);color:#fff;box-shadow:0 6px 0 var(--green2)}
.secondary{background:#eee4d1;color:var(--ink);box-shadow:0 5px 0 #cfc0a7}
.danger{background:#ead8d4;color:#793a35;box-shadow:0 5px 0 #c8aaa3}
.retry{display:none;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.retry.show{display:grid}
.confirm{display:none;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px;margin:12px 0}
.confirm.show{display:block}.confirm p{text-align:center;margin:0 0 12px}.confirm .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.result{text-align:center}.result .icon{font-size:54px}.result h2{font-size:27px;margin:4px 0 12px}
.summary{background:#fffaf0;border:1px solid var(--line);border-radius:16px;padding:14px;text-align:left;margin:12px 0 16px}
.summary p{margin:7px 0}.resultBtns{display:grid;gap:11px}
@media(max-width:380px){
  .option{font-size:14px;min-height:50px}.options{gap:8px}.question strong{font-size:30px}
}
</style>
</head>
<body>
<div class="app">
<section id="home" class="screen active">
  <div class="panel">
    <h1>иӘҝеҸ·гғһгӮ№гӮҝгғј</h1>
    <div class="version">Version 0.4</div>
    <p class="subtitle">гғЎгӮёгғЈгғјгӮӯгғјгӮ’иҰҡгҒҲгҒҹгӮүгҖҒз¶ҡгҒ‘гҒҰе№іиЎҢиӘҝгӮӮиә«гҒ«гҒӨгҒ‘гӮҲгҒҶгҖӮ</p>
    <div class="circle">
      <svg viewBox="0 0 520 520" role="img" aria-label="дә”еәҰеңҸ">
        <circle cx="260" cy="260" r="220" fill="#fbf3df" stroke="#d8cfbb" stroke-width="3"/>
        <circle cx="260" cy="260" r="148" fill="#edf4e5" stroke="#cbd6c0" stroke-width="3"/>
        <circle cx="260" cy="260" r="78" fill="#fffdf6" stroke="#d8cfbb" stroke-width="3"/>
        <text x="260" y="250" text-anchor="middle" font-size="28" font-weight="800">дә”еәҰеңҸ</text>
        <text x="260" y="278" text-anchor="middle" font-size="14" fill="#6d756f">Circle of Fifths</text>
        <g font-size="25" font-weight="800" text-anchor="middle">
          <text x="260" y="63">C</text><text x="362" y="91">G</text><text x="437" y="165">D</text>
          <text x="463" y="267">A</text><text x="437" y="369">E</text><text x="362" y="444">B</text>
          <text x="260" y="470">FвҷҜ</text><text x="158" y="444">Dвҷӯ</text><text x="83" y="369">Aвҷӯ</text>
          <text x="57" y="267">Eвҷӯ</text><text x="83" y="165">Bвҷӯ</text><text x="158" y="91">F</text>
        </g>
        <g font-size="19" font-weight="700" text-anchor="middle" fill="#465a53">
          <text x="260" y="128">Am</text><text x="326" y="146">Em</text><text x="374" y="194">Bm</text>
          <text x="392" y="262">FвҷҜm</text><text x="374" y="330">CвҷҜm</text><text x="326" y="379">GвҷҜm</text>
          <text x="260" y="396">DвҷҜm</text><text x="194" y="379">Bвҷӯm</text><text x="146" y="330">Fm</text>
          <text x="128" y="262">Cm</text><text x="146" y="194">Gm</text><text x="194" y="146">Dm</text>
        </g>
      </svg>
    </div>
    <div class="levels">
      <button class="level" data-level="1">
        <strong>Level 1гҖҖеҹәжң¬</strong>
        <span>гҖҢиӘҝеҸ· вҶ’ гғЎгӮёгғЈгғјгӮӯгғјгҖҚгҒ«жӯЈи§ЈгҒ—гҒҹгӮүгҖҒз¶ҡгҒ‘гҒҰе№іиЎҢиӘҝгӮ’зӯ”гҒҲгҒҫгҒҷгҖӮ</span>
      </button>
      <button class="level" data-level="2">
        <strong>Level 2гҖҖйҖҶеҗ‘гҒҚе•ҸйЎҢ</strong>
        <span>гҖҢгғЎгӮёгғЈгғјгӮӯгғј вҶ’ иӘҝеҸ·гҖҚгҒ«жӯЈи§ЈгҒ—гҒҹгӮүгҖҒз¶ҡгҒ‘гҒҰе№іиЎҢиӘҝгӮ’зӯ”гҒҲгҒҫгҒҷгҖӮ</span>
      </button>
      <button class="level" data-level="3">
        <strong>Level 3гҖҖз·ҸеҗҲе•ҸйЎҢ</strong>
        <span>еҹәжң¬гҒЁйҖҶеҗ‘гҒҚгӮ’гғ©гғігғҖгғ гҒ«еҮәйЎҢгҒ—гҖҒжҜҺеӣһе№іиЎҢиӘҝгҒҫгҒ§зўәиӘҚгҒ—гҒҫгҒҷгҖӮ</span>
      </button>
    </div>
  </div>
</section>

<section id="quiz" class="screen">
  <div class="top">
    <div id="levelBadge" class="badge">Level 1</div>
    <div id="stats" class="stats">жӯЈи§Ј 0гҖҖдёҚжӯЈи§Ј 0</div>
    <button id="endBtn" class="badge" type="button">зөӮдәҶ</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-label"><span id="setLabel">гӮ»гғғгғҲ 1</span><span id="stepLabel">1 / 2</span></div>
    <div class="progress"><span id="progressBar"></span></div>
  </div>

  <div id="confirm" class="confirm">
    <p>гҒ“гҒ“гҒ§зөӮдәҶгҒ—гҒҰзөҗжһңгӮ’иЎЁзӨәгҒ—гҒҫгҒҷгҒӢпјҹ</p>
    <div class="row">
      <button id="continueBtn" class="secondary" type="button">з¶ҡгҒ‘гӮӢ</button>
      <button id="confirmEndBtn" class="danger" type="button">зөӮдәҶгҒҷгӮӢ</button>
    </div>
  </div>

  <div class="question">
    <small id="qType"></small>
    <strong id="qText"></strong>
    <div id="qHint" class="hint"></div>
  </div>

  <div id="legend" class="legend"></div>
  <div id="options" class="options"></div>
  <div id="feedback" class="feedback" aria-live="polite"></div>

  <div id="retry" class="retry">
    <button id="retryBtn" class="secondary" type="button">гӮӮгҒҶдёҖеәҰеӣһзӯ”гҒҷгӮӢ</button>
    <button id="showAnswerBtn" class="primary" type="button">зӯ”гҒҲгӮ’иҰӢгӮӢ</button>
  </div>

  <div id="answerArea" class="actions">
    <button id="answerBtn" class="primary" type="button">еӣһзӯ”гҒҷгӮӢ</button>
  </div>
</section>

<section id="result" class="screen">
  <div class="panel result">
    <div class="icon">рҹҺ·</div>
    <h2>д»ҠеӣһгҒ®зөҗжһң</h2>
    <div id="summary" class="summary"></div>
    <div class="resultBtns">
      <button id="sameBtn" class="primary" type="button">еҗҢгҒҳгғ¬гғҷгғ«гӮ’з¶ҡгҒ‘гӮӢ</button>
      <button id="homeBtn" class="secondary" type="button">гғ¬гғҷгғ«йҒёжҠһгҒёжҲ»гӮӢ</button>
    </div>
  </div>
</section>
</div>

<script>
const DATA=[
  ['иӘҝеҸ·гҒӘгҒ—','C','Am'],
  ['вҷҜгҒҢ1гҒӨ','G','Em'],['вҷҜгҒҢ2гҒӨ','D','Bm'],['вҷҜгҒҢ3гҒӨ','A','FвҷҜm'],
  ['вҷҜгҒҢ4гҒӨ','E','CвҷҜm'],['вҷҜгҒҢ5гҒӨ','B','GвҷҜm'],['вҷҜгҒҢ6гҒӨ','FвҷҜ','DвҷҜm'],
  ['вҷӯгҒҢ1гҒӨ','F','Dm'],['вҷӯгҒҢ2гҒӨ','Bвҷӯ','Gm'],['вҷӯгҒҢ3гҒӨ','Eвҷӯ','Cm'],
  ['вҷӯгҒҢ4гҒӨ','Aвҷӯ','Fm'],['вҷӯгҒҢ5гҒӨ','Dвҷӯ','Bвҷӯm']
].map(([signature,major,minor])=>({signature,major,minor}));

const MAJORS=DATA.map(x=>x.major);
const MINORS=DATA.map(x=>x.minor);
const SIGNATURES=DATA.map(x=>x.signature);
const $=id=>document.getElementById(id);

let level=1;
let currentData=null;
let currentQuestion=null;
let step=1;
let setCount=0;
let selected=null;
let locked=false;
let correct=0;
let incorrect=0;
let attempts=0;
let completedSets=0;
let lastDataIndex=-1;

function shuffle(items){
  const a=[...items];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function show(id){
  document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
  $(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function pickData(){
  let index;
  do{
    index=Math.floor(Math.random()*DATA.length);
  }while(DATA.length>1 && index===lastDataIndex);
  lastDataIndex=index;
  return DATA[index];
}

function buildFirstQuestion(d){
  const direction=level===1?'signatureToMajor':
                  level===2?'majorToSignature':
                  Math.random()<.5?'signatureToMajor':'majorToSignature';

  if(direction==='signatureToMajor'){
    return {
      label:'з¬¬1е•ҸгҖҖиӘҝеҸ·гҒӢгӮүгғЎгӮёгғЈгғјгӮӯгғј',
      text:d.signature,
      answer:d.major,
      choices:shuffle(MAJORS),
      style:'major',
      hint:'еҜҫеҝңгҒҷгӮӢгғЎгӮёгғЈгғјгӮӯгғјгӮ’1гҒӨйҒёгӮ“гҒ§гҒҸгҒ гҒ•гҒ„'
    };
  }

  return {
    label:'з¬¬1е•ҸгҖҖгғЎгӮёгғЈгғјгӮӯгғјгҒӢгӮүиӘҝеҸ·',
    text:d.major,
    answer:d.signature,
    choices:shuffle(SIGNATURES),
    style:'signature',
    hint:'гҒ“гҒ®гӮӯгғјгҒ®вҷҜгғ»вҷӯгҒ®ж•°гӮ’йҒёгӮ“гҒ§гҒҸгҒ гҒ•гҒ„'
  };
}

function buildMinorQuestion(d){
  return {
    label:'з¬¬2е•ҸгҖҖе№іиЎҢиӘҝ',
    text:d.major+' гҒ®е№іиЎҢиӘҝгҒҜпјҹ',
    answer:d.minor,
    choices:shuffle(MINORS),
    style:'minor',
    hint:'mд»ҳгҒҚгҒ®гӮӯгғјгӮ’1гҒӨйҒёгӮ“гҒ§гҒҸгҒ гҒ•гҒ„'
  };
}

function start(n){
  level=n;
  correct=0;
  incorrect=0;
  attempts=0;
  completedSets=0;
  setCount=0;
  lastDataIndex=-1;
  $('levelBadge').textContent='Level '+n;
  updateStats();
  show('quiz');
  startSet();
}

function startSet(){
  setCount++;
  step=1;
  currentData=pickData();
  currentQuestion=buildFirstQuestion(currentData);
  render();
}

function render(){
  selected=null;
  locked=false;
  $('feedback').className='feedback';
  $('retry').className='retry';
  $('answerArea').style.display='block';
  $('confirm').className='confirm';

  $('setLabel').textContent='гӮ»гғғгғҲ '+setCount;
  $('stepLabel').textContent=step+' / 2';
  $('progressBar').style.width=(step===1?'50%':'100%');

  $('qType').textContent=currentQuestion.label;
  $('qText').textContent=currentQuestion.text;
  $('qHint').textContent=currentQuestion.hint;
  $('legend').textContent=currentQuestion.style==='minor'
    ?'е№іиЎҢиӘҝпјҲгғһгӮӨгғҠгғјгӮӯгғјпјүгҒӢгӮүйҒёжҠһ'
    :currentQuestion.style==='major'
      ?'гғЎгӮёгғЈгғјгӮӯгғјгҒӢгӮүйҒёжҠһ'
      :'иӘҝеҸ·гҒӢгӮүйҒёжҠһ';

  const wrap=$('options');
  wrap.innerHTML='';
  currentQuestion.choices.forEach(choice=>{
    const button=document.createElement('button');
    button.type='button';
    button.className='option '+currentQuestion.style;
    button.textContent=choice;
    button.onclick=()=>{
      if(locked)return;
      selected=choice;
      document.querySelectorAll('.option').forEach(x=>x.classList.remove('selected'));
      button.classList.add('selected');
    };
    wrap.appendChild(button);
  });
}

function answer(){
  if(!selected){
    $('feedback').textContent='зӯ”гҒҲгӮ’1гҒӨйҒёгӮ“гҒ§гҒҸгҒ гҒ•гҒ„';
    $('feedback').className='feedback show ng';
    return;
  }

  locked=true;
  attempts++;

  if(selected===currentQuestion.answer){
    correct++;
    updateStats();
    $('feedback').textContent=step===1
      ?'жӯЈи§ЈпјҒ ж¬ЎгҒҜгҖҒгҒ“гҒ®гғЎгӮёгғЈгғјгӮӯгғјгҒ®е№іиЎҢиӘҝгҒ§гҒҷгҖӮ'
      :'жӯЈи§ЈпјҒ 1гӮ»гғғгғҲе®ҢдәҶгҒ§гҒҷгҖӮ';
    $('feedback').className='feedback show ok';
    $('answerArea').style.display='none';

    setTimeout(()=>{
      if(step===1){
        step=2;
        currentQuestion=buildMinorQuestion(currentData);
        render();
      }else{
        completedSets++;
        startSet();
      }
    },850);
  }else{
    incorrect++;
    updateStats();
    $('feedback').textContent='дёҚжӯЈи§ЈгҒ§гҒҷгҖӮгӮӮгҒҶдёҖеәҰиҖғгҒҲгҒҰгҒҝгҒҫгҒ—гӮҮгҒҶгҖӮ';
    $('feedback').className='feedback show ng';
    $('answerArea').style.display='none';
    $('retry').className='retry show';
  }
}

function retry(){
  selected=null;
  locked=false;
  document.querySelectorAll('.option').forEach(x=>x.classList.remove('selected'));
  $('feedback').className='feedback';
  $('retry').className='retry';
  $('answerArea').style.display='block';
}

function showAnswer(){
  $('feedback').textContent='жӯЈи§ЈгҒҜгҖҢ'+currentQuestion.answer+'гҖҚгҒ§гҒҷгҖӮ';
  $('feedback').className='feedback show ok';
  $('retry').className='retry';

  setTimeout(()=>{
    if(step===1){
      step=2;
      currentQuestion=buildMinorQuestion(currentData);
      render();
    }else{
      startSet();
    }
  },1200);
}

function updateStats(){
  $('stats').textContent=`жӯЈи§Ј ${correct}гҖҖдёҚжӯЈи§Ј ${incorrect}`;
}

function finish(){
  const rate=attempts?Math.round(correct/attempts*100):0;
  show('result');
  $('summary').innerHTML=`
    <p><strong>гғ¬гғҷгғ«пјҡ</strong>Level ${level}</p>
    <p><strong>е®ҢдәҶгҒ—гҒҹгӮ»гғғгғҲпјҡ</strong>${completedSets}гӮ»гғғгғҲ</p>
    <p><strong>еӣһзӯ”еӣһж•°пјҡ</strong>${attempts}еӣһ</p>
    <p><strong>жӯЈи§Јпјҡ</strong>${correct}еӣһ</p>
    <p><strong>дёҚжӯЈи§Јпјҡ</strong>${incorrect}еӣһ</p>
    <p><strong>жӯЈзӯ”зҺҮпјҡ</strong>${rate}%</p>
  `;
}

document.querySelectorAll('.level').forEach(button=>{
  button.onclick=()=>start(Number(button.dataset.level));
});
$('answerBtn').onclick=answer;
$('retryBtn').onclick=retry;
$('showAnswerBtn').onclick=showAnswer;
$('endBtn').onclick=()=>$('confirm').className='confirm show';
$('continueBtn').onclick=()=>$('confirm').className='confirm';
$('confirmEndBtn').onclick=finish;
$('sameBtn').onclick=()=>start(level);
$('homeBtn').onclick=()=>show('home');
</script>
</body>
</html>
